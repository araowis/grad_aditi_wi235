<div class="bg-white p-4 rounded-xl shadow hover:shadow-md transition space-y-4">

  <h3 class="text-gray-600 font-medium mb-2">{{ title }}</h3>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div *ngIf="type === 'strength'">
      <!-- <div> -->
      <label class="block text-gray-500 text-sm mb-1">Gender</label>
      <select [(ngModel)]="gender" class="w-full border rounded px-2 py-1">
        <option value="" disabled>Select gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <div *ngIf="type === 'strength' || type === 'standardCount'">
      <!-- <div> -->
      <label class="block text-gray-500 text-sm mb-1">{{ type === 'strength' ? 'Class' : 'Standard' }}</label>
      <input type="number" [(ngModel)]="standardOrClass" class="w-full border rounded px-2 py-1"
        placeholder="Enter number" />
    </div>

    <div *ngIf="type === 'result'">
      <!-- <div> -->
      <label class="block text-gray-500 text-sm mb-1">School Name</label>
      <select [(ngModel)]="pass" class="w-full border rounded px-2 py-1 bg-white">

        <option value="" disabled selected>Select result</option>
        <option value="Pass">Pass</option>
        <option value="Fail">Fail</option>
      </select>
    </div>

  </div>

  <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600" (click)="loadStats()" [disabled]="loading">
    {{ loading ? 'Loading...' : 'Load' }}
  </button>

  <div *ngIf="value && !isArray" class="mt-4">
    <p class="text-2xl font-bold">{{ value }}</p>
  </div>

  <div *ngIf="value && isArray" class="mt-4">
    <ul class="list-disc pl-4 text-gray-700 text-sm">
      <li *ngFor="let item of value">{{ item }}</li>
    </ul>
  </div>

  <div *ngIf="value === null && loading" class="mt-4">
    <p class="text-gray-400">Loading...</p>
  </div>

</div>
