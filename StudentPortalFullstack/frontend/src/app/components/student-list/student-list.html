<div class="bg-white p-6 rounded-xl shadow-md">

  <div class="flex items-center justify-between mb-5">
    <h2 class="text-2xl font-semibold text-gray-700">Students</h2>
    <div class="flex items-center gap-3">
      <input
        class="border border-gray-300 px-3 py-2 rounded-lg shadow-sm focus:ring-2 focus:ring-green-400 outline-none w-40"
        placeholder="School" [(ngModel)]="school" (input)="loadStudents()" />
      <button
        class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-md"
        (click)="loadStudents()">Filter</button>
      <button
        class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-2 rounded-md"
        (click)="school=''; loadStudents()">Clear</button>
    </div>
  </div>

  <div class="overflow-y-auto max-h-96 border border-gray-200 rounded-lg">
    <table class="w-full border-collapse">
      <thead class="bg-gray-100 text-gray-600 text-sm uppercase sticky top-0">
        <tr>
          <th class="p-3 text-left">RegNo</th>
          <th class="p-3 text-left">RollNo</th>
          <th class="p-3 text-left">Name</th>
          <th class="p-3 text-left">Standard</th>
          <th class="p-3 text-left">School</th>
          <th class="p-3 text-left">Gender</th>
          <th class="p-3 text-left">Percentage</th>
          <th *ngIf="auth.isAdmin()" class="p-3 text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of students" class="border-t hover:bg-gray-50 transition">
          <td class="p-3">{{s.regNo}}</td>
          <td class="p-3">{{s.rollNo}}</td>
          <td class="p-3 font-medium text-gray-700">{{s.name}}</td>
          <td class="p-3">{{s.standard}}</td>
          <td class="p-3">{{s.schoolName}}</td>
          <td class="p-3">{{s.gender}}</td>
          <td class="p-3">{{s.percentage}}</td>
          <td *ngIf="auth.isAdmin()" class="p-3 space-x-3">
            <button class="text-blue-600 hover:underline font-medium" (click)="editStudent(s)">Edit</button>
            <button class="text-red-600 hover:underline font-medium" (click)="deleteStudent(s.regNo)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
