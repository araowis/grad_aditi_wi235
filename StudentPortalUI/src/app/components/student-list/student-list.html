<div class="bg-white p-6 rounded-xl shadow-md">

<h2 class="text-2xl mb-5 font-semibold text-gray-700">
Students
</h2>

<div class="overflow-x-auto">

<table class="w-full border border-gray-200 rounded-lg overflow-hidden">

<thead class="bg-gray-100 text-gray-600 text-sm uppercase">
<tr>
<th class="p-3 text-left">RegNo</th>
<th class="p-3 text-left">RollNo</th>
<th class="p-3 text-left">Name</th>
<th class="p-3 text-left">Standard</th>
<th class="p-3 text-left">School</th>
<th *ngIf="auth.isAdmin()" class="p-3 text-left">Actions</th>
</tr>
</thead>

<tbody>

<tr
*ngFor="let s of students; let i =index"
class="border-t hover:bg-gray-50 transition">

<td class="p-3">{{s.regNo}}</td>
<td class="p-3">{{s.rollNo}}</td>
<td class="p-3 font-medium text-gray-700">{{s.name}}</td>
<td class="p-3">{{s.standard}}</td>
<td class="p-3">{{s.school}}</td>

<td *ngIf="auth.isAdmin()" class="p-3 space-x-3">

<button
class="text-blue-600 hover:underline font-medium"
(click)="form.editStudent(s,i)">
Edit </button>

<button
class="text-red-600 hover:underline font-medium"
(click)="deleteStudent(i)">
Delete </button>

</td>

</tr>

</tbody>

</table>

</div>

</div>
