<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan EMI Calculator</title>
    <script src="scripts.js" defer></script>      
    <link rel="stylesheet"  href="styles.css">
</head>
<body>

<div class="container">
    <h2>Loan EMI Calculator</h2>

    <label>Applicant Name</label>
    <input type="text" id="name" required>

    <label>Loan Type</label>
    <select id="loanType">
        <option value="">--Select Loan Type--</option>
        <option value="HOME">HOME</option>
        <option value="CAR">CAR</option>
        <option value="PERSONAL">PERSONAL</option>
    </select>

    <label>Interest Rate (%)</label>
    <input type="number" id="interest" readonly>

    <label>Loan Amount</label>
    <input type="number" id="amount" onchange="principalChecker()">

    <label>Duration</label>
    <input type="number" id="duration" onchange="durationChecker()">

    <button onclick="calculateEMI()">Calculate EMI</button>

    <label>EMI</label>
    <input type="text" id="emi" readonly>

    <label>Total Amount Payable</label>
    <input type="text" id="totalPayable" readonly>

    <div class="error" id="error"></div>
</div>

</body>
</html>
